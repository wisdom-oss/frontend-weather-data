<!-- ForeCast Creation -->
<div [style]="{ height: heightWeatherBox }" class="box">
  <h1 class="title has-text-centered is-size-3">
    {{ "weather-data.title.name" | translate }}
  </h1>

  <div class="field">
    <input
      id="filterSwitch-historical"
      type="checkbox"
      name="filterSwitch-historical"
      class="switch is-rounded"
      (change)="filterHistorical(); showStationsNew()"
    />
    <label for="filterSwitch-historical">Filter Historical Stations </label>
  </div>

  <div class="columns is-multiline">
    <div class="column" *ngFor="let filterOption of filterStates | keyvalue">
      <div class="field">
        <input
          id="filterSwitch-{{ filterOption.key }}"
          type="checkbox"
          name="filterSwitch-{{ filterOption.key }}"
          class="switch is-rounded"
          [checked]="filterOption.value"
          (change)="switchFilterOption(filterOption.key); showStationsNew()"
        />
        <label for="filterSwitch-{{ filterOption.key }}"
          >Filter {{ filterOption.key }}
        </label>
      </div>
    </div>
  </div>

  <div class="card block">
    <div class="card-content p-0 is-clipped">
      <map
        #map
        height="{{ heightWeatherMap }}"
        [markers]="stationMarkers"
        [layerSelectable]="false"
        center="51.165691, 10.451526"
        zoom="6"
      ></map>
    </div>
  </div>
</div>

<div class="box">
  <h1 class="title has-text-centered is-size-3">StationShow</h1>
  <section class="section">
    <div class="container">
      <div class="columns is-multiline">
        <div class="column is-3" ng-repeat="object in objects">
          <div class="box">
            <!-- Customize the content based on your object properties -->
            <h1 class="title">{{ object.name }}</h1>
            <p>{{ object.description }}</p>
            <p>Other information: {{ object.otherInfo }}</p>
            <!-- Add more content as needed -->
          </div>
        </div>
      </div>
    </div>
  </section>
</div>

<div class="box">
  <h1 class="title has-text-centered is-size-3">Testgelände</h1>
  <button class="button is-primary" (click)="testWeatherData()">
    Test WeatherDataByStation
  </button>
</div>
<button class="button is-primary">Click for Graph</button>
<div class="box">
  <h1 class="title has-text-centered is-size-3">Graph</h1>
  <div>
    <canvas id="weather"></canvas>
  </div>
</div>
