<div [style]="{ height: heightWeatherBox }" class="box">
  <h1 class="title has-text-centered is-size-3">
    {{ "weather-data.title.name" | translate }}
  </h1>
  <!-- switches -->
  <div class="columns">
    <div class="column is-half">
      <!-- historical switch -->
      <div class="field">
        <input
          id="filterSwitch-historical"
          type="checkbox"
          name="filterSwitch-historical"
          class="switch is-rounded"
          (change)="filterHistorical(); showStations()"
        />
        <label for="filterSwitch-historical">Filter Historical Stations </label>
      </div>

      <!-- capability switches -->
      <div class="columns is-multiline">
        <div
          class="column"
          *ngFor="let filterOption of filterStates | keyvalue"
        >
          <div class="field">
            <input
              id="filterSwitch-{{ filterOption.key }}"
              type="checkbox"
              name="filterSwitch-{{ filterOption.key }}"
              class="switch is-rounded"
              [checked]="filterOption.value"
              (change)="switchFilterOption(filterOption.key); showStations()"
            />
            <label for="filterSwitch-{{ filterOption.key }}"
              >Filter {{ filterOption.key }}
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!--Weather Module -->
  <div class="columns">
    <!-- weather map -->
    <div class="column is-half">
      <div class="card block">
        <div class="card-content p-0 is-clipped">
          <map
            #map
            height="{{ heightWeatherMap }}"
            [markers]="stationMarkers"
            [layerSelectable]="false"
            center="51.165691, 10.451526"
            zoom="6"
          ></map>
        </div>
      </div>
    </div>
    <!-- station information -->
    <div class="column is-half">
      <div class="box" [style]="{ height: heightWeatherMap }">
        <div
          class="box is-flex"
          style="justify-content: space-between"
          *ngIf="station"
        >
          <p class="mb-2"><strong>Name:</strong> {{ station.name }}</p>
          <p class="mb-2"><strong>State:</strong> {{ station.state }}</p>
          <p class="mb-2"><strong>ID:</strong> {{ station.id }}</p>
          <p>
            <strong>Historical:</strong> {{ station.historical ? "Yes" : "No" }}
          </p>
        </div>
        <div class="box" *ngIf="station">
          <div class="columns">
            <div class="column is-third" *ngFor="let type of activatedFilters">
              <div class="dropdown is-active">
                <div class="dropdown-trigger">
                  <button
                    class="button"
                    aria-haspopup="true"
                    aria-controls="dropdown-menu3"
                  >
                    <span>{{ type }}</span>
                    <span class="icon is-small">
                      <i class="fas fa-angle-down" aria-hidden="true"></i>
                    </span>
                  </button>
                </div>
                <div class="dropdown-menu" id="dropdown-menu3" role="menu">
                  <div
                    class="dropdown-content"
                    *ngFor="let res of possibleResolutions"
                  >
                    <a class="dropdown-item">
                      {{ res }}
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- download weather data -->
<div class="box">
  <h1 class="title has-text-centered is-size-3">Testgelände</h1>
  <button class="button is-primary" (click)="testWeatherData()">
    Test WeatherDataByStation
  </button>
</div>
